# =============================================================================
# IDENTITY
# =============================================================================
assignment_number: 1
assignment_name: "circles"
display_name: "Circles"

# =============================================================================
# LANGUAGE & RUNTIME
# =============================================================================
language: python
runtime:
  version: "3.11"

# =============================================================================
# GRADING
# =============================================================================
grading:
  total_tests: 25
  total_points: 20
  timeout_seconds: 10
  max_attempts: 10

# =============================================================================
# SOURCE FILES
# =============================================================================
source_files:
