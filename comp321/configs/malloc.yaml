# =============================================================================
# IDENTITY
# =============================================================================
assignment_number: 5
assignment_name: "malloc"
display_name: "Dynamic Memory Allocator"

# =============================================================================
# LANGUAGE & RUNTIME
# =============================================================================
language: c
runtime:
  version: "gcc13"

# =============================================================================
# GRADING
# =============================================================================
grading:
  total_tests: 14
  total_points: 100
  timeout_seconds: 120
  max_attempts: 10

# =============================================================================
# SOURCE FILES
# =============================================================================
source_files:
  - path: "mm.c"
    functions:
      - mm_init
      - mm_malloc
      - mm_free
      - mm_realloc
      - checkheap

# =============================================================================
# TESTS
# =============================================================================
tests:
  executable: "mdriver"

# =============================================================================
# BENCHMARKING
# =============================================================================
benchmarking:
  mode: performance
  performance_threshold: 90

# =============================================================================
# POINT ALLOCATION
# =============================================================================
test_points:
  test_short1: 5
  test_short2: 5
  test_correctness: 30
  test_utilization: 30
  test_throughput: 30
